name: Build Game Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force full build even if no updates detected'
        type: boolean
        required: false
        default: false
      backend:
        description: 'Asset download backend'
        type: choice
        required: false
        default: gom
        options:
          - gom
          - campus

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Clone gakumasu-diff
        run: git clone --depth 1 https://github.com/vertesan/gakumasu-diff ./gakumasu-diff

      - name: Install package
        run: |
          pip install -e .
          pip install -r GkmasObjectManager/requirements.txt

      - name: Vendor sync
        run: kaa-data vendor-sync

      - name: Check if update needed
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE: ${{ inputs.force || 'false' }}
        run: |
          SHA=$(git -C ./gakumasu-diff rev-parse HEAD)
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "tag=data-$SHA" >> $GITHUB_OUTPUT
          if [ "$FORCE" = "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            LAST_TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "none")
            LAST_SHA="${LAST_TAG#data-}"
            if [ "$SHA" = "$LAST_SHA" ]; then
              echo "changed=false" >> $GITHUB_OUTPUT
            else
              echo "changed=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Build
        if: steps.check.outputs.changed == 'true'
        env:
          BACKEND: ${{ inputs.backend || 'gom' }}
          FORCE: ${{ inputs.force || 'false' }}
        run: |
          ARGS=(build --backend "$BACKEND")
          if [ "$FORCE" = "true" ]; then ARGS+=(--force); fi
          kaa-data "${ARGS[@]}"

      - name: Publish Release
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: kaa-data release