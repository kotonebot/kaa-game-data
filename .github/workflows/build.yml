name: Build Game Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force full build even if no updates detected'
        type: boolean
        required: false
        default: false
      backend:
        description: 'Asset download backend'
        type: choice
        required: false
        default: gom
        options:
          - gom
          - campus
      draft:
        description: 'Publish release as draft'
        type: boolean
        required: false
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Clone gakumasu-diff
        run: git clone --depth 1 https://github.com/vertesan/gakumasu-diff ./gakumasu-diff

      - name: Install package
        run: |
          pip install -r GkmasObjectManager/requirements.txt
          pip install -e .

      - name: Vendor sync
        run: kaa-data vendor-sync

      - name: Check if update needed
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE: ${{ inputs.force || 'false' }}
        run: |
          SHA=$(git -C ./gakumasu-diff rev-parse HEAD)
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          if [ "$FORCE" = "true" ]; then
            SUFFIX="r${{ github.run_number }}"
            echo "tag=data-$SHA-$SUFFIX" >> $GITHUB_OUTPUT
            echo "release_suffix=$SUFFIX" >> $GITHUB_OUTPUT
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "tag=data-$SHA" >> $GITHUB_OUTPUT
            echo "release_suffix=" >> $GITHUB_OUTPUT
            LAST_TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "none")
            if [ "$LAST_TAG" = "none" ]; then
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              REST="${LAST_TAG#data-}"
              LAST_SHA="${REST:0:40}"
              if [ "$SHA" = "$LAST_SHA" ]; then
                echo "changed=false" >> $GITHUB_OUTPUT
              else
                echo "changed=true" >> $GITHUB_OUTPUT
              fi
            fi
          fi

      - name: Build
        if: steps.check.outputs.changed == 'true'
        env:
          BACKEND: ${{ inputs.backend || 'gom' }}
          FORCE: ${{ inputs.force || 'false' }}
          KAA_RELEASE_SUFFIX: ${{ steps.check.outputs.release_suffix }}
        run: |
          ARGS=(build --backend "$BACKEND")
          if [ "$FORCE" = "true" ]; then ARGS+=(--force); fi
          if [ -n "$KAA_RELEASE_SUFFIX" ]; then
            ARGS+=(--release-suffix "$KAA_RELEASE_SUFFIX")
          fi
          kaa-data "${ARGS[@]}"

      - name: Publish Release
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE: ${{ inputs.force || 'false' }}
          DRAFT: ${{ inputs.draft || 'false' }}
          KAA_RELEASE_SUFFIX: ${{ steps.check.outputs.release_suffix }}
        run: |
          ARGS=(release)
          if [ "$FORCE" = "true" ]; then ARGS+=(--force); fi
          if [ -n "$KAA_RELEASE_SUFFIX" ]; then
            ARGS+=(--release-suffix "$KAA_RELEASE_SUFFIX")
          fi
          if [ "$DRAFT" = "true" ]; then ARGS+=(--draft); fi
          kaa-data "${ARGS[@]}"