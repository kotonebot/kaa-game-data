name: Build Game Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Clone GkmasObjectManager
        run: git clone --depth 1 https://github.com/AllenHeartcore/GkmasObjectManager.git ./GkmasObjectManager

      - name: Clone gakumasu-diff
        run: git clone --depth 1 https://github.com/vertesan/gakumasu-diff ./gakumasu-diff

      - name: Check if update needed
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(git -C ./gakumasu-diff rev-parse HEAD)
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "tag=data-$SHA" >> $GITHUB_OUTPUT
          LAST_TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "none")
          LAST_SHA="${LAST_TAG#data-}"
          if [ "$SHA" = "$LAST_SHA" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No update needed (SHA: $SHA)"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Update needed: $LAST_TAG -> data-$SHA"
          fi

      - name: Build game.db
        if: steps.check.outputs.changed == 'true'
        run: |
          mkdir -p ./output
          python tools/extract_schema.py -i ./gakumasu-diff -d ./output/game.db

      - name: Download sprites
        if: steps.check.outputs.changed == 'true'
        run: |
          python tools/extract_resources.py \
            --database ./output/game.db \
            --output-dir ./output/sprites

      - name: Compress and package
        if: steps.check.outputs.changed == 'true'
        run: |
          mkdir -p ./release
          python -c "
          import zstandard
          cctx = zstandard.ZstdCompressor(level=19)
          with open('./output/game.db', 'rb') as f_in, open('./release/game.db.zst', 'wb') as f_out:
              cctx.copy_stream(f_in, f_out)
          print('game.db compressed')
          "
          cd ./output/sprites
          zip -r ../../release/idol_cards.zip idol_cards/
          zip -r ../../release/skill_cards.zip skill_cards/
          zip -r ../../release/drinks.zip drinks/

      - name: Build manifest.json
        if: steps.check.outputs.changed == 'true'
        run: |
          python tools/build_manifest.py \
            --sha ${{ steps.check.outputs.sha }} \
            --sprites-dir ./output/sprites \
            --db ./output/game.db \
            --output ./release/manifest.json

      - name: Publish Release
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -c "
import os, json
sha = '${{ steps.check.outputs.sha }}'
notes = f'gakumasu-diff commit: {sha}'
skipped_path = './output/skipped_assets.json'
if os.path.exists(skipped_path):
    with open(skipped_path) as f:
        skipped = json.load(f)
    notes += f'\n\n## Skipped Assets ({len(skipped)})\n\n'
    notes += 'These assets are referenced in game master data but not yet available on the game CDN.\n'
    notes += 'They will be included in a future build when the CDN is updated.\n\n'
    notes += '| Asset ID | Reference |\n| --- | --- |\n'
    for item in skipped:
        notes += f\"| {item['id']} | {item['refId']} |\n\"
with open('release_notes.md', 'w', encoding='utf-8') as f:
    f.write(notes)
print(notes)
"
          gh release create "${{ steps.check.outputs.tag }}" \
            --title "Game Data ${{ steps.check.outputs.sha }}" \
            --notes-file release_notes.md \
            ./release/manifest.json \
            ./release/game.db.zst \
            ./release/idol_cards.zip \
            ./release/skill_cards.zip \
            ./release/drinks.zip
